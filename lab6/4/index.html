<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการภาพยนตร์/ซีรีส์โปรด</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="header">
            <i class="fa-solid fa-clapperboard header-icon"></i>
            <h2>รายการภาพยนตร์/ซีรีส์โปรด</h2>
        </div>

        <div class="input-group">
            <input type="text" id="movieInput" placeholder="ชื่อภาพยนตร์หรือซีรีส์...">
            <button id="addBtn">
                <i class="fa-solid fa-plus"></i> เพิ่ม
            </button>
        </div>

        <div class="actions">
            <button id="clearAllBtn" class="hidden">
                <i class="fa-solid fa-trash-can"></i> ลบทั้งหมด
            </button>
        </div>

        <div id="listContainer">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>ห
